<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ev İnterneti | Redstore İletişim</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="nav">
<div class="container nav-inner">
<div class="brand">
<div>Redstore İletişim</div>
<span class="badge">Vodafone Yetkili Franchise</span>
</div>
<div class="nav-links">
<a href="./index.html">Ana Sayfa</a>
</div>
</div>
</div>

<div class="hero">
<div class="container hero-grid">
<div>
<h1>Ev İnterneti Başvurusu</h1>
<p>Vodafone Net paketlerinden birini seçip başvurunuzu oluşturabilirsiniz.</p>
</div>
</div>
</div>

<div class="container section">
<h2>Ev İnternet Paketleri</h2>
<div class="grid">

<div class="card">
<h3>50 Mbps</h3>
<p>Limitsiz internet</p>
<button class="btn" onclick="selectPlan('50 Mbps')">Seç</button>
</div>

<div class="card">
<h3>100 Mbps</h3>
<p>Yüksek hız</p>
<button class="btn" onclick="selectPlan('100 Mbps')">Seç</button>
</div>

<div class="card">
<h3>200 Mbps</h3>
<p>Ultra hız</p>
<button class="btn" onclick="selectPlan('200 Mbps')">Seç</button>
</div>

</div>
</div>

<div id="basvuru" class="container section">
<h2>Başvuru</h2>
<div class="card">
<form>
<div class="form-grid">
<input placeholder="Ad Soyad" required>
<input placeholder="Telefon" required>
<input id="paket" placeholder="Seçilen Paket" readonly required>
<input placeholder="İl" required>
<input placeholder="İlçe" required>
<input placeholder="Mahalle" required>
<input placeholder="Sokak" required>
<input placeholder="Bina No" required>
<input placeholder="Daire No" required>
</div>
<br>
<button class="btn">Başvur</button>
</form>
</div>
</div>

<script>
function selectPlan(name){
document.getElementById('paket').value = name;
location.hash = '#basvuru';
}
</script>

</body>
</html>
