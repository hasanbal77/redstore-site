<form id="basvuruForm">
<h2>Ev İnterneti Başvuru</h2>

<input name="adsoyad" placeholder="Ad Soyad" required>
<input name="telefon" placeholder="Telefon" required>

<input name="il" placeholder="İl" required>
<input name="ilce" placeholder="İlçe" required>
<input name="mahalle" placeholder="Mahalle" required>
<input name="sokak" placeholder="Sokak" required>
<input name="bina" placeholder="Bina No" required>
<input name="daire" placeholder="Daire No" required>

<label>Kimlik Ön Yüz</label>
<input type="file" id="kimlikOn" required>

<label>Kimlik Arka Yüz</label>
<input type="file" id="kimlikArka" required>

<button type="submit">Başvur</button>
</form>

<script>
document.getElementById("basvuruForm").addEventListener("submit", async function(e) {
e.preventDefault();

const kimlikOn = document.getElementById("kimlikOn").files[0];
const kimlikArka = document.getElementById("kimlikArka").files[0];

async function upload(file) {
const res = await fetch("/api/upload", {
method: "POST",
body: file
});

const data = await res.json();
return data.url;
}

try {
const onUrl = await upload(kimlikOn);
const arkaUrl = await upload(kimlikArka);

alert("Başvuru alındı ✅");

console.log("Kimlik Ön:", onUrl);
console.log("Kimlik Arka:", arkaUrl);

} catch(err) {
alert("Yükleme başarısız ❌");
}
});
</script>
