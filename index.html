<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redstore İletişim</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
<div class="logo">Redstore <span>İletişim</span></div>
</div>

<div class="hero">
<h1>Vodafone Yetkili Bayisi</h1>
<p>Yeni hat, numara taşıma ve ev interneti işlemlerinizi hızlıca başlatın.</p>
</div>

<div class="services">
<div class="card">Yeni Faturalı Hat</div>
<div class="card">Numara Taşıma</div>
<div class="card">Ev İnterneti</div>
<div class="card">Cihaz Kampanyaları</div>
</div>

<div class="hero">
<h1>Size Uygun Paketi Seçin</h1>
<p>Güncel tarifeler aşağıda listelenmektedir.</p>
</div>

<div class="packages" id="paketler"></div>

<script>
fetch("/api/paketler")
.then(res => res.json())
.then(data => {

const alan = document.getElementById("paketler");

data.forEach(p => {

alan.innerHTML += `
<div class="package-card">
<h3>${p.isim}</h3>
<p>${p.dk}</p>
<p>${p.sosyal}</p>
<h2>${p.fiyat}</h2>
<button class="btn">Seç</button>
</div>
`;

});

});
</script>

</body>
</html>
