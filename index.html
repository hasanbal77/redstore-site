<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redstore İletişim</title>
<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#e60000;color:white;padding:30px;text-align:center;}
h1 {margin:0;}
.container {padding:20px;}
.card {background:white;margin:15px 0;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
button {background:#e60000;color:white;border:none;padding:10px 20px;border-radius:5px;font-size:16px;}
</style>
</head>
<body>

<header>
<h1>Redstore İletişim</h1>
<p>Vodafone Telekomünikasyon Yetkili Franchise Bayisi</p>
</header>

<div class="container">

<div class="card">
<h2>Yeni Faturalı Hat</h2>
<p>Aynı gün hızlı aktivasyon.</p>
<button>Başvur</button>
</div>

<div class="card">
<h2>Numara Taşıma</h2>
<p>Kesintisiz operatör geçişi.</p>
<button>Başvur</button>
</div>

<div class="card">
<h2>Cihaz Satışı</h2>
<p>Akıllı telefonlar ve aksesuarlar.</p>
<button>Detay</button>
</div>

<div class="card">
<h2>Ev İnterneti</h2>
<p>Vodafone Net başvuruları.</p>
<button>Başvur</button>
</div>

</div>

</body>
</html>
